 {% load static %}
 <section id="header"> 
    <a href="#"><img src="{%static 'img/logo.png'%}" class="logo" alt=""></a>

    <div> 
        <ul id="navbar">
            <li id="close"><i class="fa fa-times"></i></li>

 <li>
  <a class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}" 
     href="{% url 'home' %}">Home</a>
</li>

<li>
  <a class="{% if request.resolver_match.url_name == 'shop' %}active{% endif %}" 
     href="{% url 'shop' %}">Shop</a>
</li>

<li>
  <a class="{% if request.resolver_match.url_name == 'blog' %}active{% endif %}" 
     href="{% url 'blog' %}">Blog</a>
</li>

<li>
  <a class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}" 
     href="{% url 'about' %}">About</a>
</li>

<li>
  <a class="{% if request.resolver_match.url_name == 'contact' %}active{% endif %}" 
     href="{% url 'contact' %}">Contact</a>
</li>

<li>
  <a class="{% if request.resolver_match.url_name == 'cart' %}active{% endif %}" 
     href="{% url 'cart' %}">
     <i class="fa fa-shopping-bag"></i> 
  </a>
</li>

<li>
  <a class="logout-btn {% if request.resolver_match.url_name == 'signup' %}active{% endif %}" 
     href="{% url 'signup' %}">
     
     <i class="fa fa-sign-out"></i> Logout
     
  </a>
</li>

<style>
.logout-btn {
    background: linear-gradient(45deg, #ff4d4d, #ff0000);
    color: #fff !important;
    padding: 6px 18px;
    border-radius: 25px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.logout-btn:hover {
    background: #cc0000;
    transform: scale(1.08);
    box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
}

.logout-btn.active {
    border: 2px solid #fff;
}
</style>


            
        </ul>
    </div>
    
    <div id="mobile">
        <a href="cart.html"><i class="fa fa-shopping-bag"></i></a>

    </div>
    
    <div id="mobile-nav-overlay"></div>
</section>
